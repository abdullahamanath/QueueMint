      <text x="18" y="226" font-family="'Courier New', monospace" font-size="11" letter-spacing="1" fill="#9a7b3f">CURATOR-AGENT +0.03 surge</text>
      <text x="18" y="246" font-family="'Courier New', monospace" font-size="11" letter-spacing="2" fill="#8a8276">SKIPS LEFT TODAY</text>
