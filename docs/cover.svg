  <text x="600" y="600" text-anchor="middle" font-family="'Courier New', monospace" font-size="13" letter-spacing="2.5" fill="#8a8276">10–30¢ NATIVE USDC · LIMITED DAILY EDITION · BURNED ON USE · CURATOR AGENT · x402</text>
