      <rect x="18" y="18" width="224" height="150" fill="none" stroke="#7a2e22"/>
      <text x="30" y="44" font-family="'Courier New', monospace" font-size="11" letter-spacing="2" fill="#8a8276">ROOM 02 · AGENT</text>
