      <text x="18" y="200" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#1a1714">The Vanishing Line</text>
      <text x="18" y="226" font-family="'Courier New', monospace" font-size="11" letter-spacing="1" fill="#8a8276">EDITION 21/30 · ø0.18 USDC</text>
      <text x="18" y="246" font-family="'Courier New', monospace" font-size="11" letter-spacing="2" fill="#8a8276">SKIPS LEFT TODAY</text>
